name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run for Dependabot PRs
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Wait for all checks to pass
        uses: actions/github-script@v7
        id: wait-for-checks
        with:
          script: |
            const pullNumber = context.payload.pull_request?.number;
            if (!pullNumber) {
              console.log('No pull request number found in payload');
              core.setOutput('should_merge', 'false');
              return;
            }

            const maxWaitMinutes = 30;
            const checkIntervalSeconds = 15;
            const maxAttempts = Math.floor((maxWaitMinutes * 60) / checkIntervalSeconds);

            async function getCheckConclusions(ref) {
              const [checks, statuses] = await Promise.all([
                github.rest.checks.listForRef({
                  ...context.repo,
                  ref: ref
                }),
                github.rest.repos.listCommitStatusesForRef({
                  ...context.repo,
                  ref: ref
                })
              ]);

              const conclusions = [];
              
              if (checks.data.check_runs) {
                checks.data.check_runs.forEach(run => {
                  if (run.conclusion) {
                    conclusions.push(run.conclusion);
                  }
                });
              }
              
              statuses.data.forEach(status => {
                if (status.state === 'success') conclusions.push('success');
                else if (status.state === 'failure') conclusions.push('failure');
                else if (status.state === 'error') conclusions.push('error');
              });

              return conclusions;
            }

            const ref = context.payload.pull_request.head.sha;

            for (let attempt = 0; attempt < maxAttempts; attempt++) {
              console.log(`Checking status (attempt ${attempt + 1}/${maxAttempts})...`);
              
              const conclusions = await getCheckConclusions(ref);
              
              if (conclusions.length === 0) {
                console.log('No checks have completed yet, waiting...');
              } else {
                console.log('Check conclusions:', conclusions);
                
                const allPassed = conclusions.every(c => 
                  c === 'success' || c === 'skipped' || c === 'neutral'
                );
                
                const hasFailed = conclusions.some(c => 
                  c === 'failure' || c === 'error' || c === 'timed_out' || c === 'action_required'
                );

                if (hasFailed) {
                  console.log('Some checks have failed. Will not merge.');
                  core.setOutput('should_merge', 'false');
                  return;
                }

                if (allPassed) {
                  console.log('All checks passed!');
                  core.setOutput('should_merge', 'true');
                  return;
                }
              }

              if (attempt < maxAttempts - 1) {
                await new Promise(resolve => setTimeout(resolve, checkIntervalSeconds * 1000));
              }
            }

            console.log('Timeout waiting for checks to complete');
            core.setOutput('should_merge', 'false');

      - name: Merge the PR
        if: steps.wait-for-checks.outputs.should_merge == 'true'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
