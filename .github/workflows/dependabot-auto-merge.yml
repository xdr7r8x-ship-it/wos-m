name: Dependabot Auto-Merge

on:
  workflow_run:
    workflows: ["WOS-M CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read
  actions: read

jobs:
  auto-merge:
    name: Auto-merge passing Dependabot PRs
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Resolve Dependabot pull request
        id: resolve-pr
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;
            const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              ...context.repo,
              commit_sha: headSha,
            });

            const pr = associated.data.find(item =>
              item.state === 'open' &&
              item.base.ref === 'main' &&
              item.user.login === 'dependabot[bot]'
            );

            if (!pr) {
              console.log('No open Dependabot PR for this successful CI run.');
              core.setOutput('should_merge', 'false');
              return;
            }

            console.log(`Resolved Dependabot PR #${pr.number}`);
            core.setOutput('should_merge', 'true');
            core.setOutput('pr_number', String(pr.number));

      - name: Merge Dependabot PR
        if: steps.resolve-pr.outputs.should_merge == 'true'
        run: gh pr merge "$PR_NUMBER" --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.resolve-pr.outputs.pr_number }}
