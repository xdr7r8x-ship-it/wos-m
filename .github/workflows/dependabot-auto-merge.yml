name: Dependabot Auto-Merge

on:
  workflow_run:
    workflows: ["WOS-M CI"]
    types: [completed]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read
  actions: read

jobs:
  dependabot-auto-merge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    # Only run if triggered by workflow_run event AND CI passed
    if: |
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success'
      ) || (
        github.event_name == 'pull_request' &&
        github.actor == 'dependabot[bot]'
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find Dependabot PR
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            // If triggered by workflow_run, find the associated PR
            if (context.eventName === 'workflow_run') {
              const headSha = context.payload.workflow_run.head_sha;
              const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                ...context.repo,
                commit_sha: headSha,
              });

              const pr = associated.data.find(item =>
                item.state === 'open' &&
                item.user.login === 'dependabot[bot]'
              );

              if (!pr) {
                console.log('No open Dependabot PR found.');
                core.setOutput('should_merge', 'false');
                return;
              }

              console.log(`Found Dependabot PR #${pr.number}`);
              core.setOutput('should_merge', 'true');
              core.setOutput('pr_number', String(pr.number));
              core.setOutput('pr_title', pr.title);
            } 
            // If triggered by pull_request event, use the PR from context
            else if (context.eventName === 'pull_request') {
              if (context.payload.pull_request.user.login === 'dependabot[bot]') {
                console.log(`Processing Dependabot PR #${context.payload.pull_request.number}`);
                core.setOutput('should_merge', 'true');
                core.setOutput('pr_number', String(context.payload.pull_request.number));
                core.setOutput('pr_title', context.payload.pull_request.title);
              } else {
                console.log('Not a Dependabot PR, skipping.');
                core.setOutput('should_merge', 'false');
              }
            }

      - name: Wait for CI checks
        if: steps.find-pr.outputs.should_merge == 'true'
        run: |
          echo "PR: #$PR_NUMBER - $PR_TITLE"
          echo "Waiting for all CI checks to pass..."
          
          # Get the PR number
          PR_NUM=${{ steps.find-pr.outputs.pr_number }}
          
          # Wait for status checks with timeout
          MAX_WAIT=600
          INTERVAL=15
          ELAPSED=0
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # Check combined status
            STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/status --jq '.state' 2>/dev/null || echo "unknown")
            
            if [ "$STATUS" = "success" ]; then
              echo "All checks passed!"
              exit 0
            elif [ "$STATUS" = "failure" ]; then
              echo "Some checks failed."
              exit 1
            fi
            
            echo "Status: $STATUS (waited ${ELAPSED}s)..."
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          
          echo "Timeout waiting for checks"
          exit 1
        env:
          PR_NUMBER: ${{ steps.find-pr.outputs.pr_number }}
          PR_TITLE: ${{ steps.find-pr.outputs.pr_title }}

      - name: Merge PR
        if: steps.find-pr.outputs.should_merge == 'true'
        run: |
          PR_NUM=${{ steps.find-pr.outputs.pr_number }}
          echo "Merging PR #$PR_NUM..."
          gh pr merge "$PR_NUM" --squash --delete-branch --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success comment
        if: steps.find-pr.outputs.should_merge == 'true'
        run: |
          PR_NUM=${{ steps.find-pr.outputs.pr_number }}
          gh pr comment "$PR_NUM" --repo "${{ github.repository }}" \
            --body "✅ **Auto-merged by GitHub Actions** — All CI checks passed!"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Failure comment
        if: steps.find-pr.outputs.should_merge == 'true' && failure()
        run: |
          PR_NUM=${{ steps.find-pr.outputs.pr_number }}
          gh pr comment "$PR_NUM" --repo "${{ github.repository }}" \
            --body "⚠️ **Auto-merge skipped** — CI checks failed or timed out. Please review manually."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
