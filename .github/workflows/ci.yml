name: WOS-M CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio certifi aiohttp ddddocr psutil
          pip install -r requirements-dev.txt
        
      - name: Create .env for tests
        run: |
          cat > .env << 'EOF'
          DISCORD_BOT_TOKEN=test_token_for_ci
          DISCORD_APPLICATION_ID=123456789
          OWNER_DISCORD_ID=123456789
          WOSM_DEMO_MODE=false
          DEFAULT_LANGUAGE=ar
          DATABASE_URL=sqlite:///data/wosm.sqlite
          WOS_GIFT_PUBLIC_ENDPOINT=https://example.com
          WOS_PLAYER_PUBLIC_ENDPOINT=https://example.com
          REAL_REDEMPTION_PROVIDER=WhiteoutProject
          EOF
      
      - name: Compileall Check
        run: python -m compileall . -q
      
      - name: Lint Check
        run: python -m flake8 core modules integrations views tests main.py
      
      - name: Type Check
        run: |
          pip install 'mypy<1.8' numpy==1.26.4 -q
          python -m mypy core modules integrations views main.py
      
      - name: Run Tests
        run: python -m pytest tests/ -v --tb=short
      
      - name: System Check
        run: python main.py --check
  
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Check for hardcoded secrets
        run: python scripts/security_scan.py
      
      - name: Check for placeholders
        run: |
          python -c "
          from pathlib import Path
          
          found = []
          for py in Path('.').rglob('*.py'):
            if 'test' in str(py) or '.venv' in str(py):
              continue
            if py.name == 'main.py':  # Skip main.py - contains the pattern for scanning
              continue
            with open(py) as f:
              for i, line in enumerate(f, 1):
                if 'pass  # Placeholder' in line or 'pass # Placeholder' in line:
                  found.append(f'{py}:{i}')
          
          if found:
            print('PLACEHOLDERS FOUND:')
            for f in found:
              print(f'  {f}')
            exit(1)
          print('No placeholders found')
          "
      
      - name: Check for TODO/under development
        run: |
          python -c "
          from pathlib import Path
          
          forbidden = ['TODO', 'قيد التطوير', 'غير مفعّلة', 'Coming soon', 'Not implemented']
          found = []
          
          for py in Path('modules').rglob('*.py'):
            with open(py) as f:
              for i, line in enumerate(f, 1):
                for pattern in forbidden:
                  if pattern in line:
                    found.append(f'{py}:{i}: {pattern}')
          
          if found:
            print('FOUND ISSUE:')
            for f in found[:10]:
              print(f'  {f}')
            exit(1)
          print('No TODO/under development found')
          "

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install audit tool
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      
      - name: Run dependency audit
        run: python -m pip_audit -r requirements.txt

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: docker build . --tag wos-m:test --load
      
      - name: Verify image created
        run: docker images wos-m:test

  discord-runtime-qa:
    name: Discord Runtime QA Live
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      HAS_DISCORD_RUNTIME_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Skip live runtime QA when token is not configured
        if: env.HAS_DISCORD_RUNTIME_TOKEN != 'true'
        run: echo "DISCORD_BOT_TOKEN secret is not configured; skipping live Discord runtime QA."

      - name: Run Discord runtime smoke test
        if: env.HAS_DISCORD_RUNTIME_TOKEN == 'true'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python scripts/discord_runtime_smoke.py
